name: edutrack_mobile
description: EduTrack — Smart Attendance Mobile App for Students & Lecturers
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # HTTP / API
  dio: ^5.4.3+1
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utilities
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
