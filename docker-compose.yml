version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: landmark_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://db:27017/${DB_NAME:-landmark_attendance}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - landmark_net

  db:
    image: mongo:7
    container_name: landmark_db
    restart: unless-stopped
    volumes:
      - db_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - landmark_net

  mongo-express:
    image: mongo-express:latest
    container_name: landmark_mongo_express
    restart: unless-stopped
    ports:
      - "8080:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: db
    depends_on:
      - db
    networks:
      - landmark_net
    profiles:
      - tools

volumes:
  db_data:
    driver: local

networks:
  landmark_net:
    driver: bridge
